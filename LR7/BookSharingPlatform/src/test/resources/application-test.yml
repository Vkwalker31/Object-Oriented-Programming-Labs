spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER_CASE=true
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  flyway:
    enabled: false
  sql:
    init:
      mode: always

jwt:
  secret: test-secret-key-for-testing-only-32-chars
  expiration-ms: 3600000

server:
  servlet:
    context-path: /
